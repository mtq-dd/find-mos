name: Flutter APK Build

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.24.x
          cache: true

      - name: Create android/local.properties pointing to Android SDK
        run: |
          # Prefer ANDROID_SDK_ROOT, fallback to ANDROID_HOME, then $HOME/Android/Sdk
          SDK_PATH="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-$HOME/Android/Sdk}}"
          echo "Detected ANDROID_SDK_ROOT='$ANDROID_SDK_ROOT' ANDROID_HOME='$ANDROID_HOME'"
          echo "Using SDK_PATH='$SDK_PATH'"
          if [ ! -d "$SDK_PATH" ]; then
            echo "Android SDK not found at $SDK_PATH"
            echo "Environment: ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT ANDROID_HOME=$ANDROID_HOME"
            # Print some common locations for debugging
            ls -la /usr/lib || true
            ls -la /usr/local || true
            ls -la $HOME || true
            exit 1
          fi
          # Write local.properties in android/ so Gradle can find sdk.dir
          echo "sdk.dir=$SDK_PATH" > android/local.properties
          echo "Created android/local.properties:"
          cat android/local.properties

      - name: Ensure android/gradlew is executable & show Gradle version
        run: |
          if [ -f android/gradlew ]; then
            chmod +x android/gradlew
            echo "Gradle wrapper found; printing version:"
            cd android
            ./gradlew --version
            cd ..
          else
            echo "android/gradlew not found — please commit the Gradle wrapper (recommended)."
            exit 1
          fi

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Build release APK (unsigned)
        run: flutter build apk --release

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apk-builds
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: build/app/outputs/flutter-apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
