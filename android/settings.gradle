include ':app'

def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterSdkPath = localProperties.getProperty("flutter.sdk")
if (flutterSdkPath == null && System.getenv("FLUTTER_ROOT") != null) {
    flutterSdkPath = System.getenv("FLUTTER_ROOT")
}
if (flutterSdkPath == null) {
    throw new GradleException("Flutter SDK not found. Define location with flutter.sdk in the local.properties file.")
}

def flutterSdkPathNormalized = flutterSdkPath.replaceAll("\\\\", "/")
def flutterToolsGradlePath = "$flutterSdkPathNormalized/packages/flutter_tools/gradle/flutter.gradle"
if (!new File(flutterToolsGradlePath).exists()) {
    throw new GradleException("Flutter SDK not found at $flutterSdkPath")
}
apply from: flutterToolsGradlePath
