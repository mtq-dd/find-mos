pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
    repositories {
        google()
        mavenCentral()
    }
}

include ':app'

def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    def localProperties = new Properties()
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }

    def flutterSdkPath = localProperties.getProperty("flutter.sdk")
    if (flutterSdkPath != null) {
        // local property is used by flutter.gradle internally
    }
}
// Fallback to FLUTTER_ROOT env var
def flutterSdkPathEnv = System.getenv("FLUTTER_ROOT")
if (flutterSdkPathEnv != null) {
    // Resolved by flutter.gradle from context
}
